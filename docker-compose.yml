# Runs the OpenID Conformance Suite for testing the OIDC provider.
#
# Prerequisites: clone and build the conformance suite first:
#
#   git clone https://gitlab.com/openid/conformance-suite.git
#   cd conformance-suite
#   MAVEN_CACHE=./m2 docker compose -f builder-compose.yml run builder
#   cd ..
#
# Then start with: docker compose up -d --wait
# Access the UI at: https://localhost.emobix.co.uk:8443/

services:
  mongodb:
    image: mongo:6.0.13
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./conformance-suite/server-dev
    depends_on:
      mongodb:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./conformance-suite/target:/server
    command: >
      java
      -jar /server/fapi-test-suite.jar
      --fintechlabs.devmode=true
      --fintechlabs.startredir=true
      --fintechlabs.base_url=https://localhost.emobix.co.uk:8443
      --spring.data.mongodb.uri=mongodb://mongodb:27017/test_suite
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  nginx:
    build:
      context: ./conformance-suite/nginx
      dockerfile: Dockerfile-static
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "8443:8443"

volumes:
  mongodb-data:

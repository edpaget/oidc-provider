name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Validate version
        run: |
          VERSION="${{ inputs.version }}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid semver: $VERSION"
            exit 1
          fi
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "::error::Tag v$VERSION already exists"
            exit 1
          fi

      - name: Update VERSION
        run: echo "${{ inputs.version }}" > VERSION

      - name: Update CHANGELOG.md
        run: |
          DATE=$(date +%Y-%m-%d)
          sed -i "s/^## \[Unreleased\]/## [Unreleased]\n\n## [${{ inputs.version }}] - $DATE/" CHANGELOG.md

      - name: Create release branch
        run: |
          BRANCH="release/v${{ inputs.version }}"
          git checkout -b "$BRANCH"
          git add VERSION CHANGELOG.md
          git commit -m "release: v${{ inputs.version }}"
          git push origin "$BRANCH"

      - name: Create PR
        run: |
          gh pr create \
            --title "release: v${{ inputs.version }}" \
            --body "Automated release PR for v${{ inputs.version }}." \
            --label "release"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up branch on failure
        if: failure()
        run: git push origin --delete "release/v${{ inputs.version }}" || true

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Validate version
        run: |
          VERSION="${{ inputs.version }}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid semver: $VERSION"
            exit 1
          fi
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "::error::Tag v$VERSION already exists"
            exit 1
          fi

      - name: Verify CI checks passed
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          SHA=$(git rev-parse HEAD)
          for CHECK in lint format test; do
            CONCLUSION=$(gh api "repos/${{ github.repository }}/commits/${SHA}/check-runs" \
              --jq ".check_runs[] | select(.name == \"${CHECK}\") | .conclusion" | head -1)
            if [ "$CONCLUSION" != "success" ]; then
              echo "::error::Required check '${CHECK}' has not passed (status: ${CONCLUSION:-not found})"
              exit 1
            fi
          done

      - name: Update VERSION
        run: echo "${{ inputs.version }}" > VERSION

      - name: Update CHANGELOG.md
        run: |
          DATE=$(date +%Y-%m-%d)
          sed -i "s/^## \[Unreleased\]/## [Unreleased]\n\n## [${{ inputs.version }}] - $DATE/" CHANGELOG.md

      - name: Update README.md versions
        run: |
          sed -i 's|net.carcdr/oidc-provider {:mvn/version "[^"]*"}|net.carcdr/oidc-provider {:mvn/version "${{ inputs.version }}"}|' README.md
          sed -i 's|\[net.carcdr/oidc-provider "[^"]*"\]|[net.carcdr/oidc-provider "${{ inputs.version }}"]|' README.md

      - name: Commit release
        run: |
          git add VERSION CHANGELOG.md README.md
          git commit -m "release: v${{ inputs.version }}"
          git push origin main

      - name: Push tag
        run: |
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          cli: latest

      - uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: deps-${{ hashFiles('deps.edn') }}
          restore-keys: deps-

      - name: Build JAR
        run: clojure -T:build jar

      - name: Deploy to Clojars
        run: clojure -X:deploy :artifact '"target/oidc-provider-${{ inputs.version }}.jar"' :pom-file '"target/classes/META-INF/maven/net.carcdr/oidc-provider/pom.xml"'
        env:
          CLOJARS_USERNAME: ${{ secrets.CLOJARS_USERNAME }}
          CLOJARS_PASSWORD: ${{ secrets.CLOJARS_PASSWORD }}

      - name: Bump to next snapshot
        run: |
          MAJOR=$(echo "${{ inputs.version }}" | cut -d. -f1)
          MINOR=$(echo "${{ inputs.version }}" | cut -d. -f2)
          PATCH=$(echo "${{ inputs.version }}" | cut -d. -f3)
          NEXT_PATCH=$((PATCH + 1))
          SNAPSHOT="${MAJOR}.${MINOR}.${NEXT_PATCH}-SNAPSHOT"
          echo "$SNAPSHOT" > VERSION
          git add VERSION
          git commit -m "chore: prepare ${SNAPSHOT} for next development cycle"
          git push origin main
